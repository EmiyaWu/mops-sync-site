name: Sync MOPS and Deploy Site

on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Export and deploy the site even when no new MOPS rows were found"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

concurrency:
  group: mops-sync-site
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Sync MOPS
        id: sync
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MOPS_SHEET_ID: ${{ secrets.MOPS_SHEET_ID }}
          TZ: Asia/Taipei
          MOPS_STATE_PATH: state/seen_messages.json
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_IDS: ${{ secrets.LINE_TARGET_IDS }}
          LINE_NOTIFY_ENABLED: ${{ secrets.LINE_NOTIFY_ENABLED }}
          LINE_NOTIFY_MAX_INDIVIDUAL: ${{ secrets.LINE_NOTIFY_MAX_INDIVIDUAL }}
          MOPS_SITE_URL: https://mops-sync-site.pages.dev/
        run: python sync_once_output.py

      - name: Export public site
        if: ${{ steps.sync.outputs.has_new_rows == 'true' || github.event.inputs.force_deploy == 'true' }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MOPS_SHEET_ID: ${{ secrets.MOPS_SHEET_ID }}
          TZ: Asia/Taipei
        run: python site_export.py

      - name: Upload static site artifact
        if: ${{ steps.sync.outputs.has_new_rows == 'true' || github.event.inputs.force_deploy == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: mops-public-site
          path: public

      - name: Skip site deploy
        if: ${{ steps.sync.outputs.has_new_rows != 'true' && github.event.inputs.force_deploy != 'true' }}
        run: echo "No new MOPS rows found. Skipping site export and Cloudflare Pages deploy."

      - name: Verify Cloudflare settings
        if: ${{ (steps.sync.outputs.has_new_rows == 'true' || github.event.inputs.force_deploy == 'true') && env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PROJECT_NAME != '' }}
        run: |
          test -d public
          find public -maxdepth 3 -type f | sort
          echo "Cloudflare project secret length: ${#CLOUDFLARE_PROJECT_NAME}"
          echo "Cloudflare account id length: ${#CLOUDFLARE_ACCOUNT_ID}"
          python - <<'PY'
          import os
          project = os.environ.get("CLOUDFLARE_PROJECT_NAME", "")
          print("Project secret has leading/trailing whitespace:", project != project.strip())
          print("Project secret character codes:", " ".join(str(ord(ch)) for ch in project))
          PY

      - name: Deploy to Cloudflare Pages
        if: ${{ (steps.sync.outputs.has_new_rows == 'true' || github.event.inputs.force_deploy == 'true') && env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PROJECT_NAME != '' }}
        run: |
          npm install --global wrangler@latest
          wrangler --version
          echo "Projects visible to this token/account before create:"
          wrangler pages project list || true
          echo "Ensuring Cloudflare Pages project exists: $CLOUDFLARE_PROJECT_NAME"
          wrangler pages project create "$CLOUDFLARE_PROJECT_NAME" --production-branch=main || true
          echo "Projects visible to this token/account after create:"
          wrangler pages project list || true
          wrangler pages deploy public --project-name="$CLOUDFLARE_PROJECT_NAME" --branch=main --commit-dirty=true
