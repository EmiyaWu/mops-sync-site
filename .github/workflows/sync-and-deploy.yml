name: Sync MOPS and Deploy Site

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Sync MOPS and export public site
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MOPS_SHEET_ID: ${{ secrets.MOPS_SHEET_ID }}
          TZ: Asia/Taipei
          MOPS_STATE_PATH: state/seen_messages.json
        run: python mos_s.py once --export-site public

      - name: Upload static site artifact
        uses: actions/upload-artifact@v4
        with:
          name: mops-public-site
          path: public

      - name: Verify Cloudflare settings
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PROJECT_NAME != '' }}
        run: |
          test -d public
          find public -maxdepth 3 -type f | sort
          echo "Cloudflare project secret length: ${#CLOUDFLARE_PROJECT_NAME}"
          echo "Cloudflare account id length: ${#CLOUDFLARE_ACCOUNT_ID}"
          python - <<'PY'
          import os
          project = os.environ.get("CLOUDFLARE_PROJECT_NAME", "")
          print("Project secret has leading/trailing whitespace:", project != project.strip())
          print("Project secret character codes:", " ".join(str(ord(ch)) for ch in project))
          PY

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PROJECT_NAME != '' }}
        run: |
          npm install --global wrangler@latest
          wrangler --version
          echo "Projects visible to this token/account before create:"
          wrangler pages project list || true
          echo "Ensuring Cloudflare Pages project exists: $CLOUDFLARE_PROJECT_NAME"
          wrangler pages project create "$CLOUDFLARE_PROJECT_NAME" --production-branch=main || true
          echo "Projects visible to this token/account after create:"
          wrangler pages project list || true
          wrangler pages deploy public --project-name="$CLOUDFLARE_PROJECT_NAME" --branch=main --commit-dirty=true
